<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3U Router — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">📡</div>
      <h1 class="text-2xl font-bold text-white tracking-tight">M3U Router</h1>
      <p class="text-gray-500 text-sm mt-1">Painel Administrativo</p>
    </div>

    {% if error %}
    <div class="bg-red-950 border border-red-800 text-red-400 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label class="block text-gray-400 text-sm font-medium mb-2">Senha</label>
      <input
        type="password"
        name="password"
        autofocus
        required
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3 mb-5 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-600"
        placeholder="••••••••••••"
      />
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors"
      >
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
