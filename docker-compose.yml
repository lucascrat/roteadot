services:
  roteador:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - roteador_data:/app/data
    environment:
      - ADMIN_PASSWORD=M3uPro@2026!
      - SESSION_TIMEOUT_MINUTES=30
      - DB_PATH=data/roteador.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  roteador_data:
